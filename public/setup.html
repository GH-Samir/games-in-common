<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<script src="/theme-init.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Set up Games in Common</title>
<style>
  :root[data-theme="dark"] {
    color-scheme: dark;
    --bg: #0e1013;
    --panel: #1b1f24;
    --border: #2a2f37;
    --text: #eef0f2;
    --text-dim: #9aa2ac;
    --danger: #ef7272;
  }
  :root[data-theme="light"] {
    color-scheme: light;
    --bg: #f4f5f7;
    --panel: #ffffff;
    --border: #dfe2e7;
    --text: #1a1d21;
    --text-dim: #5b6169;
    --danger: #d1435b;
  }
  :root[data-accent="blue"] { --accent: #4da6ff; --accent-strong: #2f8fed; --accent-contrast: #ffffff; }
  :root[data-accent="violet"] { --accent: #9b8cff; --accent-strong: #7c65f0; --accent-contrast: #ffffff; }
  :root[data-accent="emerald"] { --accent: #3fd17a; --accent-strong: #22b562; --accent-contrast: #06210f; }
  :root[data-accent="amber"] { --accent: #ffab5c; --accent-strong: #f2903a; --accent-contrast: #2a1600; }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }
  .card {
    max-width: 440px;
    width: 100%;
    padding: 32px;
    margin: 24px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 6px 20px rgba(0, 0, 0, 0.2);
  }
  h1 { font-size: 1.3rem; margin: 0 0 8px; }
  p { color: var(--text-dim); font-size: 0.9rem; line-height: 1.5; }
  a { color: var(--accent); }
  input {
    width: 100%;
    padding: 10px 12px;
    margin: 16px 0 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font: inherit;
  }
  input:focus { outline: none; border-color: var(--accent); }
  button {
    width: 100%;
    padding: 10px 14px;
    font: inherit;
    font-weight: 600;
    cursor: pointer;
    border: none;
    border-radius: 6px;
    background: var(--accent);
    color: var(--accent-contrast);
  }
  button:hover { background: var(--accent-strong); }
  button:disabled { opacity: 0.6; cursor: default; }
  .error { color: var(--danger); font-size: 0.85rem; min-height: 1.2em; margin-top: 8px; }
</style>
</head>
<body>
<div class="card">
  <h1>Set up Games in Common</h1>
  <p>
    This app needs a Steam Web API key to look up games and friends.
    Get a free one at
    <a href="https://steamcommunity.com/dev/apikey" target="_blank" rel="noopener">steamcommunity.com/dev/apikey</a>
    (any domain name works, e.g. "localhost").
  </p>
  <form id="setup-form">
    <input type="text" id="key-input" placeholder="Paste your Steam Web API key" autocomplete="off" required>
    <button type="submit" id="submit-btn">Save and continue</button>
    <div class="error" id="error"></div>
  </form>
</div>
<script>
  const form = document.getElementById('setup-form');
  const input = document.getElementById('key-input');
  const errorEl = document.getElementById('error');
  const submitBtn = document.getElementById('submit-btn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errorEl.textContent = '';
    submitBtn.disabled = true;
    submitBtn.textContent = 'Checking key…';

    try {
      const res = await fetch('/api/config/steam-key', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ steamApiKey: input.value }),
      });
      const data = await res.json();
      if (!res.ok) {
        throw new Error(data.message || 'Something went wrong.');
      }
      window.location.href = '/';
    } catch (err) {
      errorEl.textContent = err.message;
      submitBtn.disabled = false;
      submitBtn.textContent = 'Save and continue';
    }
  });
</script>
</body>
</html>
