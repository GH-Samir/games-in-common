name: Build desktop app

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: {}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            build-cmd: npm run dist -- --win
            artifact-name: windows-installer
            artifact-path: release/*.exe
          - os: ubuntu-latest
            build-cmd: npm run dist -- --linux
            artifact-name: linux-packages
            artifact-path: |
              release/*.AppImage
              release/*.deb
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci

      - run: ${{ matrix.build-cmd }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
